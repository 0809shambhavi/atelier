name: Atelier CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: Test backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.15"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Check imports work
        working-directory: backend
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          os.environ.setdefault('OPENAI_API_KEY', 'test')
          os.environ.setdefault('UNSPLASH_KEY', 'test')
          os.environ.setdefault('OPENWEATHER_KEY', 'test')
          os.environ.setdefault('RAPIDAPI_KEY', 'test')
          from tools import TOOLS, execute_tool
          from prompt import SYSTEM_PROMPT
          print('All imports OK')
          print(f'Tools: {[t[\"function\"][\"name\"] for t in TOOLS]}')
          print(f'Prompt length: {len(SYSTEM_PROMPT)} chars')
          "

      - name: Validate tools
        working-directory: backend
        run: |
          python -c "
          from tools import TOOLS
          names = [t['function']['name'] for t in TOOLS]
          assert 'get_weather' in names
          assert 'search_moodboard_images' in names
          assert 'search_products' in names
          assert 'generate_outfit_image' in names
          print(f'All {len(TOOLS)} tools validated OK')
          "

      - name: Validate prompt
        working-directory: backend
        run: |
          python -c "
          from prompt import SYSTEM_PROMPT
          assert len(SYSTEM_PROMPT) > 500
          assert 'moodboard' in SYSTEM_PROMPT
          assert 'looks' in SYSTEM_PROMPT
          assert 'COPY_FROM_TOOL' in SYSTEM_PROMPT
          print('Prompt validated OK')
          "

  # ── Job 2: Build and push Docker images ─────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/atelier-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/atelier-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/atelier-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/atelier-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}

  # ── Job 3: Deploy backend to Render ─────────────────────────────────────────
  deploy-backend:
    name: Deploy backend to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys")
          echo "Render response: $RESPONSE"

      - name: Wait for deploy
        run: sleep 90

      - name: Health check
        run: |
          URL="${{ secrets.VITE_BACKEND_URL }}/health"
          RESPONSE=$(curl -sf "$URL" || echo '{"status":"failed"}')
          echo "Health: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') == 'ok', f'Unhealthy: {d}'
          print('Backend healthy')
          "

  # ── Job 4: Deploy frontend to Vercel ────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        working-directory: frontend
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
