name: Atelier CI/CD

on:
  push:
    branches: [main]        # runs on every push to main
  pull_request:
    branches: [main]        # runs tests on PRs but does not deploy

jobs:

  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: Test backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.15"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check imports work
        run: |
          cd backend
          python -c "from main import app; from tools import TOOLS; from prompt import SYSTEM_PROMPT; print('All imports OK')"

      - name: Check prompt.py is valid
        run: |
          cd backend
          python -c "
          from prompt import SYSTEM_PROMPT
          assert len(SYSTEM_PROMPT) > 100, 'SYSTEM_PROMPT too short'
          assert 'type' in SYSTEM_PROMPT, 'SYSTEM_PROMPT missing type field'
          print(f'SYSTEM_PROMPT length: {len(SYSTEM_PROMPT)} chars — OK')
          "

      - name: Check tools.py structure
        run: |
          cd backend
          python -c "
          from tools import TOOLS, execute_tool
          assert len(TOOLS) >= 4, 'Expected at least 4 tools'
          names = [t['function']['name'] for t in TOOLS]
          assert 'get_weather' in names, 'Missing get_weather'
          assert 'search_moodboard_images' in names, 'Missing search_moodboard_images'
          assert 'search_products' in names, 'Missing search_products'
          print(f'Tools found: {names} — OK')
          "

  # ── Job 2: Build and push Docker images ─────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test                # only runs if test job passes
    if: github.ref == 'refs/heads/main'  # only on main branch, not PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/atelier-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/atelier-backend:${{ github.sha }}
          cache-from: type=gha        # GitHub Actions cache — speeds up builds
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/atelier-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/atelier-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}

  # ── Job 3: Deploy to Render ──────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend to Render
    runs-on: ubuntu-latest
    needs: build               # only runs after images are built and pushed
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
          | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print('Deploy triggered:', data.get('id', 'unknown'))
          "

      - name: Wait for Render deploy to finish
        run: |
          echo "Waiting 90 seconds for Render to deploy..."
          sleep 90

      - name: Verify deployment health
        run: |
          HEALTH=$(curl -s https://atelier-backend.onrender.com/health)
          echo "Health response: $HEALTH"
          echo $HEALTH | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data.get('status') == 'ok', f'Health check failed: {data}'
          print('Backend is healthy')
          "

  # ── Job 4: Deploy frontend to Vercel ────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: |
          cd frontend
          vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
