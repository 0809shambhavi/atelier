server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve React app — all routes fall back to index.html
    # This handles client-side routing (/share/:id, /saves etc.)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → backend service
    # In Docker Compose: backend container is called "backend"
    # In Kubernetes: backend Service is called "atelier-backend"
    # In production (Render/Vercel): VITE_BACKEND_URL handles this instead
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Critical for long-running requests (DALL-E takes up to 30s)
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
}
