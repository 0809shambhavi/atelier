services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atelier-backend
    env_file:
      - ./backend/.env
    environment:
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: atelier-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: atelier-network
